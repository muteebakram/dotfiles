# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# Config version for compatibility and deprecations
# Fallback value (if you omit the key): config-version = 1
config-version = 2

# You can use it to add commands that run after AeroSpace startup.
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = [
    'exec-and-forget open -a "Microsoft Outlook"',
    'exec-and-forget open -a Slack',
    'exec-and-forget open -a "Microsoft Teams"',
    'exec-and-forget open -a Codex',
    'exec-and-forget open -a iTerm',
    'exec-and-forget bash -c "for _ in 1 2; do open -na \"Brave Browser\"; sleep 1; done"',
    # Three Cursor windows on workspace 4 (stacked fullscreen; switch with Ctrl+arrows)
    'exec-and-forget bash -c "for _ in 1 2 3; do open -na Cursor; done"',
    'exec-and-forget open -a Obsidian',
    'exec-and-forget open -a Spotify',
    # Land on editor workspace after Cursor windows are ready (v_accordion stack = fullscreen)
    'exec-and-forget bash -c "until [ \"$(aerospace list-windows --workspace 4 --count 2>/dev/null || echo 0)\" -ge 1 ]; do sleep 0.5; done; aerospace workspace 4"',
]

# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 0 # stack looks fullscreen; use Ctrl+↑/↓ to switch windows

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Move the mouse to the center of the window on focus change:
on-focus-changed = "move-mouse window-lazy-center"

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-ctrl-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# List of workspaces that should stay alive even when they contain no windows,
# even when they are invisible.
# This config version is only available since 'config-version = 2'
# Fallback value (if you omit the key): persistent-workspaces = []
persistent-workspaces = ["0", "1", "2", "3", "4", "9"]

# Browser and Cursor (4) → second monitor when connected; else main
# See: https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[workspace-to-monitor-force-assignment]
    2 = ['secondary', 'main']
    4 = ['secondary', 'main']

# A callback that runs every time binding mode changes
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# See: https://nikitabobko.github.io/AeroSpace/commands#mode
on-mode-changed = []

# Possible values: (qwerty|dvorak|colemak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
    preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See:
#                 https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
    inner.horizontal = -5
    inner.vertical =   -5
    outer.left =       -5
    outer.bottom =     -5
    outer.top =        -5
    outer.right =      -5

# Personal (Spotify + Codex) → workspace 0
[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = ['move-node-to-workspace 0', 'layout v_accordion', 'join-with down']

# Workspace 1 (M is alias): Slack | Teams
# ┌─────────────┬─────────────┐
# │    Slack    │    Teams    │
# └─────────────┴─────────────┘
[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['layout tiling', 'join-with up', 'move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = ['layout tiling', 'join-with right', 'move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.microsoft.teams'
run = ['layout tiling', 'join-with right', 'move-node-to-workspace 1']

# Browsers → workspace 2 (B is alias); Chrome left, Safari right
[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = ['layout tiling', 'join-with left', 'move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = ['layout tiling', 'join-with right', 'move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'com.brave.Browser'
run = ['move-node-to-workspace 2', 'layout tiling']

# AI (Codex) → workspace 0
[[on-window-detected]]
if.app-id = 'com.openai.codex'
run = ['move-node-to-workspace 0', 'layout v_accordion', 'join-with down']

# iTerm2 → workspace 3
[[on-window-detected]]
if.app-id = 'com.googlecode.iterm2'
run = ['move-node-to-workspace 3', 'fullscreen on --no-outer-gaps']

# Cursor → workspace 4 (vertical accordion stack; one window visible; Ctrl+arrows to switch)
[[on-window-detected]]
if.app-id = 'com.todesktop.230313mzl4w4u92'
run = ['move-node-to-workspace 4', 'layout v_accordion', 'join-with down']

# Notes (Obsidian + Outlook) → workspace 9
# ┌─────────────┬─────────────┐
# │   Obsidian  │   Outlook   │
# └─────────────┴─────────────┘
[[on-window-detected]]
if.app-id = 'md.obsidian'
run = ['layout tiling', 'join-with left', 'move-node-to-workspace 9']

[[on-window-detected]]
if.app-id = 'com.microsoft.Outlook'
run = ['layout tiling', 'join-with right', 'move-node-to-workspace 9']

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

    # All possible keys:
    # - Letters.        a, b, c, ..., z
    # - Numbers.        0, 1, 2, ..., 9
    # - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
    # - F-keys.         f1, f2, ..., f20
    # - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
    #                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
    #                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
    #                   sectionSign (ISO keyboards only, european keyboards only)
    # - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
    #                   keypadMinus, keypadMultiply, keypadPlus
    # - Arrows.         left, down, up, right

    # All possible modifiers: cmd, alt, ctrl, shift

    # All possible commands: https://nikitabobko.github.io/AeroSpace/commands

    # See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
    # You can uncomment the following lines to open up terminal with ctrl + enter shortcut
    # (like in i3)
    # ctrl-enter = '''exec-and-forget osascript -e '
    # tell application "Terminal"
    #     do script
    #     activate
    # end tell'
    # '''

    # See: https://nikitabobko.github.io/AeroSpace/commands#layout
    ctrl-slash = 'layout tiles horizontal vertical'
    ctrl-comma = 'layout accordion horizontal vertical'

    # See: https://nikitabobko.github.io/AeroSpace/commands#focus
    # wrap-around helps cycle Cursor windows in workspace 4 v_accordion stack
    ctrl-left = 'focus --boundaries-action wrap-around-the-workspace left'
    ctrl-down = 'focus --boundaries-action wrap-around-the-workspace down'
    ctrl-up = 'focus --boundaries-action wrap-around-the-workspace up'
    ctrl-right = 'focus --boundaries-action wrap-around-the-workspace right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move
    ctrl-leftSquareBracket = 'move left'
    ctrl-rightSquareBracket = 'move right'
    ctrl-shift-down = 'move down'
    ctrl-shift-up = 'move up'

    # Cycle workspaces across all monitors (non-empty only)
    ctrl-shift-left = 'exec-and-forget bash -c "aerospace list-workspaces --monitor all --empty no | aerospace workspace prev --wrap-around --stdin"'
    ctrl-shift-right = 'exec-and-forget bash -c "aerospace list-workspaces --monitor all --empty no | aerospace workspace next --wrap-around --stdin"'
    # Jump focus between monitors (workspace on each monitor stays put)
    ctrl-alt-left = 'focus-monitor --wrap-around left'
    ctrl-alt-right = 'focus-monitor --wrap-around right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#resize
    ctrl-minus = 'resize smart -50'
    ctrl-equal = 'resize smart +50'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace
    ctrl-0 = 'workspace 0'
    cmd-0 = 'workspace 0'

    ctrl-1 = 'workspace 1' # Messaging (Slack + Teams)
    cmd-1 = 'workspace 1'
    ctrl-m = 'workspace 1' # M is an alias for workspace 1
    cmd-m = 'workspace 1'

    ctrl-2 = 'workspace 2' # Browsers
    # ctrl-b = 'workspace 2' # B is an alias for workspace 2 (browsers)
    cmd-2 = 'workspace 2'

    ctrl-3 = ['workspace 3', 'fullscreen on --no-outer-gaps'] # iTerm2
    cmd-3 = ['workspace 3', 'fullscreen on --no-outer-gaps']
    ctrl-t = ['workspace 3', 'fullscreen on --no-outer-gaps'] # T is an alias for workspace 3 (iTerm2)

    ctrl-4 = 'workspace 4' # Editor
    cmd-4 = 'workspace 4'
    cmd-e = 'workspace 4'

    ctrl-8 = 'workspace 8'
    cmd-8 = 'workspace 8'

    ctrl-9 = 'workspace 9' # Notes (Obsidian + Outlook)
    cmd-9 = 'workspace 9'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
    ctrl-shift-0 = 'move-node-to-workspace 0'
    ctrl-shift-1 = 'move-node-to-workspace 1'
    ctrl-shift-m = 'move-node-to-workspace 1' # M is an alias for workspace 1
    ctrl-shift-2 = 'move-node-to-workspace 2'
    ctrl-shift-3 = 'move-node-to-workspace 3'
    ctrl-shift-4 = 'move-node-to-workspace 4'
    ctrl-shift-8 = 'move-node-to-workspace 8'
    ctrl-shift-9 = 'move-node-to-workspace 9'
    ctrl-shift-b = 'move-node-to-workspace 2' # B is an alias for workspace 2
    ctrl-shift-d = 'move-node-to-workspace D'
    ctrl-shift-t = 'move-node-to-workspace 3' # T is an alias for workspace 3
    ctrl-shift-u = 'move-node-to-workspace U'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
    # ctrl-tab = 'workspace-back-and-forth'
    # See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
    # (fails for workspaces 1 and 5 — they are force-assigned to secondary)
    # ctrl-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # See: https://nikitabobko.github.io/AeroSpace/commands#mode
    ctrl-shift-semicolon = 'mode service'

    # Add keybind to fullscreen a window
    ctrl-shift-f = 'fullscreen'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    backspace = ['close-all-windows-but-current', 'mode main']

    # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
    #s = ['layout sticky tiling', 'mode main']

    ctrl-shift-h = ['join-with left', 'mode main']
    ctrl-shift-j = ['join-with down', 'mode main']
    ctrl-shift-k = ['join-with up', 'mode main']
    ctrl-shift-l = ['join-with right', 'mode main']
