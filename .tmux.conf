# Link: https://github.com/catppuccin/tmux

# Change prefix key
unbind C-b
set -g prefix `
bind ` send-prefix

# Reload tmux config
unbind r
bind r source-file ~/.tmux.conf

# Status bar position
set-option -g status-position top

# Status bar frequency update
set-option -g status-interval 1

# Enable RGB colour if running in xterm(1)
set-option -sa terminal-overrides ",xterm*:Tc"

# Change the default $TERM to tmux-256color
set -g default-terminal "tmux-256color"

# Shift arrows to change sessions
bind -n S-Left switch-client -p
bind -n S-Right switch-client -n

# Shift arrows to change windows 
bind -n S-Up previous-window 
bind -n S-Down next-window 

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# No bells at all
set -g bell-action none

# Keep windows around after they exit
set -g remain-on-exit on

# splitting panes with | and -
bind | split-window -h
bind - split-window -v

# Turn the mouse on, but without copy mode dragging
set -g mouse on

# Disable confirmation prompts
bind-key & kill-window
bind-key x kill-pane

# Start new window from the PWD
bind c new-window -c "#{pane_current_path}"

# Catppuccin config
set -g status-right-length 100
set -g status-left-length 100

set -g @catppuccin_date_time_text "%a/%d %H:%M"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_text " #{b:pane_current_path}"
set -g @catppuccin_window_current_text " #{s|$HOME|~|:pane_current_path}"

run ~/.tmux/plugins/tmux/catppuccin.tmux

# Status line modules must be set after Catppuccin loads.
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_date_time}"
set -ag status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux'

# Initialize tmux plugin
run ~/.tmux/plugins/tpm/tpm
